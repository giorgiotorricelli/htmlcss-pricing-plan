<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>htmlcss-pricing-plan</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/stylesheet.css">
</head>
<body>
    <header class="header container">
        <div class="incipit">
            <h1>Our Pricing Plan</h1>
            <p class="grayfont">
                We are an industry-leading company that values
                honesty, integrity and efficiency, building
                quality products.
            </p>
        </div>
        <div class="actions">
            <span class="grayfont">Monthly</span>
            <button class="monthly">
                <i class="bi bi-toggle-on"></i>
            </button>
            <span class="grayfont">Yearly</span>
            <button class="yearly">
                <i class="bi bi-toggle-on"></i>
            </button>
        </div>
    </header>
    <main>
        <section class="cards">
            <div class="card"></div>
            <div class="card"></div>
            <div class="card"></div>
        </section>
    </main>
    
</body>
</html>
